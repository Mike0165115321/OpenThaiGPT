<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenThaiGPT Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="text-gray-300 font-sans">

    <div id="app-container" class="relative h-screen w-full flex flex-col items-center">

        <div class="flex-grow w-full max-w-3xl mx-auto flex flex-col items-center justify-center px-4">

            <div id="welcome-screen" class="text-center">
                <div class="animated-ai-icon-container mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                        class="w-12 h-12 text-blue-500">
                        <path fill-rule="evenodd"
                            d="M9 4.5a.75.75 0 01.721.544l.813 2.846a3.75 3.75 0 002.527 2.527l2.846.813a.75.75 0 010 1.442l-2.846.813a3.75 3.75 0 00-2.527 2.527l-.813 2.846a.75.75 0 01-1.442 0l-.813-2.846a3.75 3.75 0 00-2.527-2.527l-2.846-.813a.75.75 0 010-1.442l2.846-.813A3.75 3.75 0 007.466 7.89l.813-2.846A.75.75 0 019 4.5zM18 1.5a.75.75 0 01.728.568l.258 1.036c.236.94.97 1.674 1.91 1.91l1.036.258a.75.75 0 010 1.456l-1.036.258c-.94.236-1.674.97-1.91 1.91l-.258 1.036a.75.75 0 01-1.456 0l-.258-1.036a2.625 2.625 0 00-1.91-1.91l-1.036-.258a.75.75 0 010-1.456l1.036-.258a2.625 2.625 0 001.91-1.91l.258-1.036A.75.75 0 0118 1.5zM16.5 15a.75.75 0 01.712.513l.394 1.183c.15.447.5.799.948.948l1.183.395a.75.75 0 010 1.422l-1.183.395c-.447.15-.799.5-.948.948l-.395 1.183a.75.75 0 01-1.422 0l-.395-1.183a1.5 1.5 0 00-.948-.948l-1.183-.395a.75.75 0 010-1.422l1.183-.395c.447-.15.799-.5.948-.948l.395-1.183A.75.75 0 0116.5 15z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
                <h1 class="text-3xl font-semibold text-white">I am OpenThaiGPT 7B</h1>
                <p class="text-sm text-gray-500">คุณสามารถถามผมได้เลย</p>
            </div>

            <div id="chat-interface" class="hidden w-full h-full flex flex-col">
                <header class="py-4">
                    <button id="new-chat-button"
                        class="flex items-center text-sm bg-gray-800 hover:bg-gray-700 px-3 py-1.5 rounded-lg transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                        </svg>
                        New chat
                    </button>
                </header>
                <main id="messages-container" class="flex-grow overflow-y-auto pr-2"></main>
            </div>

        </div>

        <footer class="w-full max-w-3xl mx-auto p-4">
            <form id="message-form"
                class="w-full bg-[#282828] border border-gray-700 rounded-full shadow-[0_0_20px_rgba(156,163,175,0.1)]">
                <div class="relative flex items-center p-2">
                    <input type="text" id="message-input" placeholder="Message OpenThaiGPT" autocomplete="off"
                        class="flex-grow bg-transparent text-white placeholder-gray-500 outline-none px-4">
                    <button type="submit" id="send-button"
                        class="bg-gray-700 hover:bg-gray-600 rounded-full p-2.5 ml-2 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
                        </svg>
                    </button>
                </div>
            </form>
            <p class="text-xs text-center text-gray-600 mt-2">AI-generated, for reference only</p>
        </footer>
    </div>

    <script src="static/script.js"></script>
</body>

</html>
